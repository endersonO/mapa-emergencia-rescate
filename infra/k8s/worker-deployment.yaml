# Worker Deployment — runs the BullMQ workers: external-source sync (crawl,
# geocode, dedup), HUB ingest (scheduled, ongoing) + the one-time Neon→Hetzner
# backfill (table copy + photo rehost to R2). Its own pods, scaled by replicas,
# NOT behind the LB (no Service). Reuses the BACKEND image (same artifact as the
# API; web/worker/migrate differ only by `command` — standard practice).
#
# Env: app-env (DATABASE_URL, VALKEY_URL) + migrate-env (NEON_DATABASE_URL, R2_*
# — solo lo necesita el backfill one-time; el sync/HUB usan app-env). CI overwrites
# the image tag, same as the API. Graceful SIGTERM drains jobs
# (terminationGracePeriodSeconds) so a rolling restart never drops in-flight work.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: migrate-worker
  namespace: mapa
  labels:
    app: migrate-worker
spec:
  # Start small; scale with `kubectl -n mapa scale deploy/migrate-worker --replicas=N`.
  # Photo throughput is bounded by the BullMQ rate limiter, not replica count.
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: migrate-worker
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app: migrate-worker
    spec:
      imagePullSecrets:
        - name: ghcr-pull
      # Cadena de drenado alineada (patrón Hermes/Celery: cada capa > la interna):
      #   job más largo (sync chunked, HUB/SYNC_TIME_BUDGET_MS ~200s)
      #     < worker.close() cap (WORKER_CLOSE_TIMEOUT_MS=210s, worker/index.ts)
      #       < terminationGracePeriodSeconds (240s) < SIGKILL de k8s.
      # Así un redeploy nunca corta un job a la mitad; si aun así pasa, BullMQ lo
      # reintenta (jobs idempotentes + checkpointed por cursor).
      terminationGracePeriodSeconds: 240
      containers:
        - name: worker
          # CI parchea el tag a la imagen -backend:<sha> (mismo artefacto que la
          # API). WORKDIR del backend = /app/backend, así que worker/index.ts es
          # relativo. tsx resuelve el alias @/ del tsconfig del backend.
          image: ghcr.io/OWNER/REPO-backend:latest
          command: ["npx", "tsx", "worker/index.ts"]
          envFrom:
            - secretRef:
                name: app-env # DATABASE_URL, VALKEY_URL
            - secretRef:
                name: migrate-env # NEON_DATABASE_URL, R2_* (solo backfill one-time)
          env:
            # Scraping/sync de fuentes externas DESACTIVADO en prod (intención
            # actual). Apaga el crawl de desaparecidosterremotovenezuela.com /
            # venezuelatebusca.com + el geocode de mantenimiento, y la federación
            # HUB. El worker sigue vivo para los jobs encolados a mano (backfill
            # one-time, fotos→R2). Reactivar = quitar estas dos o ponerlas a "1".
            - name: SYNC_SCHEDULERS
              value: "0"
            - name: HUB_SCHEDULERS
              value: "0"
            - name: PHOTOS_CONCURRENCY
              value: "8"
            - name: TABLES_CONCURRENCY
              value: "4"
            - name: PHOTO_RATE_MAX
              value: "20"
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              memory: "512Mi"
